# ------------------------------------------------------------------------
# Session options (st-option [-g])
# ------------------------------------------------------------------------
# Change bind key
unbind-key c-b
set-option -g prefix c-t

# Window
set-option -g renumber-windows on
set -g base-index 1

# vi mode
set-option -g status-keys vi

# 256-color
set-option -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Allow programs in tmux to bypass tmux and send sequences directly to the terminal.
# This is required for features like desktop notifications (e.g. Claude Code) in Ghostty.
set-option -g allow-passthrough on

# Update environment variables
set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM_PROGRAM"


## Display pane
set-option -g display-panes-time "5000"

# Increase key repeat delay.
set-option -g repeat-time "1000"    # default: 500

# ------------------------------------------------------------------------
# Window options (st-window-option [-g])
# ------------------------------------------------------------------------
# vi mode
set-option -gw mode-keys vi

# ------------------------------------------------------------------------
# Key bindings (bind-key)
# ------------------------------------------------------------------------
## General
bind-key t send-prefix
bind-key \; command-prompt
bind-key . source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind-key G set status
bind-key y copy-mode

## Window
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -c "#{pane_current_path}"
bind-key n next-window
bind-key p previous-window
bind-key N swap-window -d -t :+
bind-key P swap-window -d -t :-
bind-key -r / next-layout
bind-key r command-prompt -I "#S" "rename-session '%%'"
bind-key c new-window

# Pane
bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5
bind-key 0 select-layout -E
bind-key b break-pane
bind-key B join-pane -t :-

# Synchronize panes
bind-key * set-option -w synchronize-panes

# Choose
bind-key w choose-tree
bind-key e choose-session

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ------------------------------------------------------------------------
# Decoration
# ------------------------------------------------------------------------
## Status
set-option -g status "on"
set-option -g status-justify "left"
set-option -g status-style "fg=#c6c8d1,bg=default"
set-option -g status-left-length "50"   # default: 10
set-option -g status-right-length "50"  # defualt: 40

## Pane
set-option -g pane-border-style "fg=#2e3244"
set-option -g pane-active-border-style "fg=#00857B"

## Message
set-option -g message-style "fg=#c6c8d1,bg=#2e3244"
set-option -g message-command-style "fg=#c6c8d1,bg=#2e3244"

## Window
set-option -gw window-status-activity-style "none,fg=#454b68,bg=default"
set-option -gw window-status-separator ""
set-option -gw window-status-style "fg=#c6c8d1,bg=default"

## Status format
set-option -g status-left "#[fg=#c6c8d1,bg=#454b68,bold] 󰌌 #S #[fg=#454b68,bg=default,nobold,nounderscore,noitalics] "
set-option -g status-right "#[fg=#454b68,bg=default,nobold,nounderscore,noitalics]#[fg=#c6c8d1,bg=#454b68,bold] #H "
set-option -gw window-status-format "#[fg=#1e2132,bg=default,nobold,nounderscore,noitalics]#[fg=#c6c8d1,bg=#1e2132,nobold] #I: #W #F #[fg=#1e2132,bg=default,nobold,nounderscore,noitalics]"
set-option -gw window-status-current-format "#[fg=#454b68,bg=default,nobold,nounderscore,noitalics]#[fg=#c6c8d1,bg=#454b68,bold] #I: #W #F #[fg=#454b68,bg=default,nobold,nounderscore,noitalics]"

