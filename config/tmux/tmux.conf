# ------------------------------------------------------------------------
# Session options (st-option [-g])
# ------------------------------------------------------------------------
# Change bind key
unbind-key c-b
set-option -g prefix c-t

# Renumber windows
set-option -g renumber-windows on

# Key binding in the status line
set-option -g status-keys vi

# 256-color
set-option -g default-terminal "xterm-256color"
set-option -g terminal-overrides "xterm:colors=256"

# ------------------------------------------------------------------------
# Window options (st-window-option [-g])
# ------------------------------------------------------------------------

# ------------------------------------------------------------------------
# Key bindings (bind-key)
# ------------------------------------------------------------------------
## General
bind-key t send-prefix
bind-key \; command-prompt
bind-key r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind-key G set status

## Window
# Split
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -c "#{pane_current_path}"
bind-key -r n next-window
bind-key -r p previous-window
bind-key -r N swap-window -d -t :+
bind-key -r P swap-window -d -t :-
bind-key -r / next-layout

# Pane
bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Synchronize panes
bind-key * set-window-option synchronize-pane

# ------------------------------------------------------------------------
# Decoration
# ------------------------------------------------------------------------
set-option -g status "on"
set-option -g status-justify "left"
set-option -g status-style "fg=#c6c8d1,bg=default"

set-option -g pane-border-style "fg=#2e3244"
set-option -g pane-active-border-style "fg=#00857B"

set-option -g message-style "fg=#c6c8d1,bg=#2e3244"
set-option -g message-command-style "fg=#c6c8d1,bg=#2e3244"

set-window-option -g window-status-activity-style "none,fg=#454b68,bg=default"
set-window-option -g window-status-separator ""
set-window-option -g window-status-style "fg=#c6c8d1,bg=default"

set -g status-left "#[fg=#c6c8d1,bg=#454b68,bold] 󰌌 #S #[fg=#454b68,bg=default,nobold,nounderscore,noitalics] "
set -g status-right "#[fg=#454b68,bg=default,nobold,nounderscore,noitalics]#[fg=#c6c8d1,bg=#454b68,bold] #H "
setw -g window-status-format "#[fg=#1e2132,bg=default,nobold,nounderscore,noitalics]#[fg=#c6c8d1,bg=#1e2132,nobold] #I: #W #F #[fg=#1e2132,bg=default,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#454b68,bg=default,nobold,nounderscore,noitalics]#[fg=#c6c8d1,bg=#454b68,bold] #I: #W #F #[fg=#454b68,bg=default,nobold,nounderscore,noitalics]"

